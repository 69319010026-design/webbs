<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>สมุดเช็คชื่อกิจกรรม</title>
    <link class="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

    <div class="bg-primary text-white py-4 mb-4 shadow-sm">
        <div class="container text-center">
            <h1 class="fw-bold" style="color: blue;"><i class="bi bi-journal-check me-2"></i>Activity Check-in<i class="bi bi-clipboard-x me-2"></i></h1>
            <p class="mb-0">ระบบบันทึกการเข้าร่วมกิจกรรมนักเรียน (Frontend Demo)</p>
        </div>
    </div>

    </div>
    <div class="container">
        <div class="row g-4">

            <div class="col-12 col-lg-4">
                <div class="card border-0 shadow-sm p-4">
                    <h4 class="fw-bold text-primary mb-3"><i class="bi bi-person-plus-fill me-2"></i>บันทึกกิจกรรม</h4>
                    <form id="activityForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">รหัสนักเรียน</label>
                            <input type="text" class="form-control" id="studentId" placeholder="เช่น 66301234" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">ชื่อ - นามสกุล</label>
                            <input type="text" class="form-control" id="studentName" placeholder="เช่น นายสมชาย สายลุย"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">ชื่อกิจกรรม</label>
                            <select class="form-select" id="activityName" required>
                                <option value="" selected disabled>-- เลือกกิจกรรม --</option>
                                <option value="กิจกรรมปฐมนิเทศ">กิจกรรมปฐมนิเทศ</option>
                                <option value="กิจกรรมวันไหว้ครู">กิจกรรมวันไหว้ครู</option>
                                <option value="กิจกรรมจิตอาสา">กิจกรรมจิตอาสา</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold d-block">สถานะการเข้าร่วม</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="statusOptions" id="status1"
                                    value="เข้าร่วม" checked>
                                <label class="form-check-label text-success fw-bold" for="status1">เข้าร่วม</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="statusOptions" id="status2"
                                    value="มาสาย">
                                <label class="form-check-label text-warning fw-bold" for="status2">มาสาย</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="statusOptions" id="status3"
                                    value="ขาด">
                                <label class="form-check-label text-danger fw-bold" for="status3">ขาด</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">บันทึกข้อมูล</button>
                    </form>

                </div>
            </div>
           
            <div class="col-12 col-lg-8">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h4 class="fw-bold mb-3"><i class="bi bi-table me-2"></i>รายชื่อการเข้าร่วมกิจกรรม</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 20%;">รหัสนักเรียน</th>
                                    <th style="width: 30%;">ชื่อ - นามสกุล</th>
                                    <th style="width: 35%;">กิจกรรม</th>
                                    <th style="width: 15%;" class="text-center">สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="studentTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>


        </div>
    </div>




    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('activityForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const studentId = document.getElementById('studentId').value;
            const studentName = document.getElementById('studentName').value;
            const activityName = document.getElementById('activityName').value;
            const status = document.querySelector('input[name="statusOptions"]:checked').value;

            let badgeColor = '';
            if (status === 'เข้าร่วม') badgeColor = 'bg-success-subtle text-success border border-success';
            else if (status === 'มาสาย') badgeColor = 'bg-warning-subtle text-warning border border-warning';
            else badgeColor = 'bg-danger-subtle text-danger border border-danger';

            const tableBody = document.getElementById('studentTableBody');
            const newRow = document.createElement('tr');

            newRow.innerHTML = `
                <td>${studentId}</td>
                <td>${studentName}</td>
                <td>${activityName}</td>
                <td class="text-center"><span class="badge ${badgeColor} px-3 py-2">${status}</span></td>
            `;

            tableBody.appendChild(newRow);
            document.getElementById('activityForm').reset();
        });
    </script>

</body>




</html>
